version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yii2api-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: yii2api
      MYSQL_USER: yii2api
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - yii2api_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yii2api-app
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: yii2api
      DB_USER: yii2api
      DB_PASSWORD: secret
      DB_DSN: "mysql:host=mysql;port=3306;dbname=yii2api"
      DEMO_USER_PASSWORD: demo_secret_password
      APP_BASE_URL: http://localhost:8088
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: yii2api-web
    restart: always
    ports:
      - "8088:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  yii2api_mysql_data:
