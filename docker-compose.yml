version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yii2api-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: yii2api
      MYSQL_USER: yii2api
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - yii2api_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yii2api_mysql_data:
